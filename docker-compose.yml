services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: indoors-backend
    command: uv run daphne -b 0.0.0.0 -p 8000 config.asgi:application
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    container_name: indoors-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-indoors_db}
      POSTGRES_USER: ${POSTGRES_USER:-indoors_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-indoors_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: indoors-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: